<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MeetSlot — Timezone meeting planner</title>
<style>
:root {
  --bg:        #f6f6f4;
  --surface:   #ffffff;
  --surface2:  #f0f0ed;
  --border:    #e3e3de;
  --border2:   #c8c8c2;
  --text:      #181816;
  --text2:     #5a5a56;
  --text3:     #9a9a94;
  --blue:      #3b82f6;
  --blue-idle: rgba(59,130,246,0.10);
  --green-dk:  #15803d;
  --green-md:  #4ade80;
  --amber:     #f59e0b;
  --orange:    #fb923c;
  --red:       #ef4444;
  --now:       #f59e0b;
  --radius:    10px;
  --rsm:       6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* ── Layout ── */
.wrap{max-width:720px;margin:0 auto;padding:0 1rem 5rem}
header{padding:2rem 0 1.5rem;display:flex;align-items:baseline;gap:.75rem}
.logo{font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
.logo span{color:#16a34a}
.tagline{font-size:.8rem;color:var(--text3)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.slabel{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem}

/* ── Add row ── */
.add-row{display:flex;gap:8px}
.add-row input{flex:1;height:40px;border:1px solid var(--border2);border-radius:var(--rsm);padding:0 12px;font-size:.9rem;background:var(--bg);color:var(--text);outline:none;transition:border .15s}
.add-row input:focus{border-color:var(--blue)}
.add-row input::placeholder{color:var(--text3)}
.inp-name{max-width:120px}
.btn{height:40px;padding:0 16px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:.85rem;font-weight:500;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:background .12s}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.98)}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-blue:hover{background:#2563eb;border-color:#2563eb}
.btn-sm{height:32px;padding:0 12px;font-size:.78rem}

/* ── Autocomplete ── */
.city-wrap{position:relative;flex:1}
.ac-list{position:absolute;top:44px;left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rsm);max-height:200px;overflow-y:auto;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.08);display:none}
.ac-list div{padding:9px 12px;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:8px}
.ac-list div:hover,.ac-list div.hi{background:var(--surface2)}
.ac-flag{font-size:1.1rem}
.ac-ctry{color:var(--text3);font-size:.78rem;margin-left:auto}

/* ── People list ── */
.people-list{display:flex;flex-direction:column;gap:6px;margin-top:.75rem}
.chip{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rsm);background:var(--bg);border:1px solid var(--border);font-size:.85rem}
.chip .cflag{font-size:1.2rem;flex-shrink:0}
.chip .cmeta{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chip .cname{font-weight:600;color:var(--text)}
.chip .cdot{color:var(--text3)}
.chip .ctz{color:var(--text3);font-size:.78rem}
.chip .crm{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:1.1rem;padding:2px 6px;border-radius:4px}
.chip .crm:hover{background:var(--surface2);color:var(--red)}
.foot-row{display:flex;justify-content:flex-end;margin-top:.5rem}
.clear-btn{background:none;border:none;font-size:.78rem;color:var(--text3);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.clear-btn:hover{color:var(--red)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:.9rem}
.empty-icon{font-size:2.5rem;margin-bottom:.5rem}

/* ── Timeline card ── */
.tl-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.tl-grid{min-width:540px;position:relative}

/* Header rows */
.tl-hdr-area{margin-bottom:8px}
.tl-hdr-row{display:flex;align-items:center;height:20px}
.tl-rlabel{width:100px;flex-shrink:0;font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.tl-hlabels{flex:1;display:flex}
.tl-hl{flex:2;text-align:center;font-size:.65rem;color:var(--text3)}

/* Local time row */
.tl-local-row{display:flex;align-items:center;height:20px;margin-top:2px}
.tl-ltag{width:100px;flex-shrink:0;font-size:.62rem;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:4px;overflow:hidden}
.tl-ltag .ldot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0}
.tl-ltag .lname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-lhours{flex:1;display:flex}
.tl-ll{flex:2;text-align:center;font-size:.65rem;font-weight:600;color:var(--blue)}

/* Hint */
.tl-hint{font-size:.68rem;color:var(--text3);margin-bottom:7px}

/* Person rows */
.tl-row{display:flex;align-items:center;margin-bottom:4px}
.tl-name{width:100px;flex-shrink:0;font-size:.78rem;color:var(--text2);padding:3px 8px 3px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-radius:4px;transition:background .12s;user-select:none;display:flex;align-items:center;gap:4px}
.tl-name:hover{background:var(--surface2)}
.tl-name.pinned{font-weight:700;background:var(--blue-idle);color:var(--blue)}
.tl-blocks{flex:1;display:flex;height:28px;border-radius:5px;overflow:hidden}
.tl-b{flex:1}

/* Overlap row */
.tl-sep{border-top:1px solid var(--border);margin:5px 0 7px}
.tl-ov-row{display:flex;align-items:center}
.tl-ov-label{width:100px;flex-shrink:0;font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.tl-ov-wrap{flex:1;position:relative;height:28px}
.tl-ov-blocks{display:flex;height:28px;border-radius:5px;overflow:hidden;position:relative;z-index:0}
.tl-ovb{flex:1}

/* ── Scrubber ── */
.scrubber{
  position:absolute;top:0;bottom:0;width:3px;
  background:var(--now);border-radius:2px;
  cursor:ew-resize;z-index:20;touch-action:none;
  transform:translateX(-50%);
}
.scrubber::before{
  content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:13px;height:13px;border-radius:50%;
  background:var(--now);box-shadow:0 0 0 3px #fff,0 0 0 5px var(--now);
}
/* Scrubber tooltip shown above overlap row */
.scrub-tip{
  position:absolute;bottom:calc(100% + 6px);left:0;
  background:#18181e;color:#fff;font-size:.7rem;font-weight:600;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
  pointer-events:none;z-index:30;transform:translateX(-50%);
  opacity:0;transition:opacity .12s;
}
.scrub-tip.show{opacity:1}

/* Per-row scrubber tooltip */
.row-tip{
  position:absolute;right:0;top:50%;transform:translateY(-50%);
  background:var(--blue);color:#fff;font-size:.65rem;font-weight:700;
  padding:2px 7px;border-radius:4px;pointer-events:none;z-index:15;
  opacity:0;transition:opacity .1s;white-space:nowrap;
}
.row-tip.show{opacity:1}
.tl-row{position:relative}

/* Now scrubber vertical line — lives in ovWrap, extends upward through person rows */
.now-full-line{
  position:absolute;width:2px;background:var(--now);
  pointer-events:none;z-index:10;transform:translateX(-50%);border-radius:2px;
  bottom:0;
}

/* Legend */
.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--text3)}
.leg-block{width:14px;height:10px;border-radius:2px;flex-shrink:0}

/* Summary */
.ov-summary{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;font-weight:500;padding:4px 10px;border-radius:20px}
.badge-green{background:#dcfce7;color:#15803d}
.badge-yellow{background:#fef3c7;color:#d97706}
.badge-gray{background:var(--surface2);color:var(--text2)}
.bdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.bdot-g{background:#16a34a}.bdot-y{background:#d97706}.bdot-r{background:var(--red)}

/* ── Suggestions ── */
.sugs{display:flex;flex-direction:column;gap:10px}
.sug{border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;background:var(--surface)}
.sug.best{border-color:#86efac;background:#f0fdf4}
.sug.ok{border-color:#fde68a;background:#fffbeb}
.sug-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sug-title{font-size:.85rem;font-weight:600}
.sug-utc{margin-left:auto;font-size:.75rem;color:var(--text3)}
.sug-times{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.sug-t{display:flex;flex-direction:column;gap:1px}
.sug-t .sc{font-size:.7rem;color:var(--text3)}
.sug-t .st{font-size:.95rem;font-weight:700;letter-spacing:-.01em}
.sug-t .snd{font-size:.65rem;color:var(--amber);font-weight:600}
.sug-foot{display:flex;align-items:center;justify-content:space-between}
.foot-note{font-size:.72rem;color:var(--text3)}
.wa-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--rsm);background:#25d366;color:#fff;border:none;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .12s}
.wa-btn:hover{background:#1da851}
.wa-btn svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}

/* ── Share ── */
.share-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px}
.share-url{flex:1;font-size:.78rem;color:var(--text3);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.share-note{font-size:.72rem;color:var(--text3);margin-top:6px}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:#18181e;color:#fff;padding:10px 20px;border-radius:24px;font-size:.82rem;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:500px){.add-row{flex-wrap:wrap}.inp-name{max-width:100%}header{flex-direction:column;gap:.25rem}}
</style>
</head>

<div class="wrap">
  <header>
    <div class="logo">meet<span>slot</span></div>
    <div class="tagline">Find meeting times across timezones — share via WhatsApp</div>
  </header>

  <!-- ADD -->
  <div class="card">
    <div class="slabel">Add participants</div>
    <div class="add-row">
      <input class="inp-name" id="inp-name" type="text" placeholder="Name" maxlength="20" autocomplete="off"/>
      <div class="city-wrap">
        <input id="inp-city" type="text" placeholder="City — e.g. Buenos Aires" autocomplete="off"/>
        <div class="ac-list" id="ac-list"></div>
      </div>
      <button class="btn btn-blue" id="btn-add">+ Add</button>
    </div>
    <div class="people-list" id="people-list">
      <div class="empty" id="empty-msg"><div class="empty-icon">🌍</div>Add at least 2 people to see the timeline</div>
    </div>
    <div class="foot-row" id="clear-row" style="display:none">
      <button class="clear-btn" id="btn-clear">Clear all</button>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="card" id="card-tl" style="display:none">
    <div class="slabel">24-hour view · UTC</div>
    <div class="tl-outer" id="tl-outer">
      <div class="tl-grid" id="tl-grid"></div>
    </div>
    <div class="legend" id="tl-legend"></div>
    <div class="ov-summary" id="ov-summary"></div>
  </div>

  <!-- SUGGESTIONS -->
  <div class="card" id="card-sugs" style="display:none">
    <div class="slabel">Best meeting windows</div>
    <div class="sugs" id="sugs"></div>
  </div>

  <!-- SHARE -->
  <div class="card" id="card-share" style="display:none">
    <div class="slabel">Share this lineup</div>
    <div class="share-row">
      <div class="share-url" id="share-url"></div>
      <button class="btn btn-sm" id="btn-copy-link">Copy link</button>
    </div>
    <div class="share-note">Anyone with this link sees the same participants — no account needed.</div>
  </div>
</div>
<div class="toast" id="toast"></div>

// ─── HOUR ZONES ───────────────────────────────────────────────────────────────
// ideal: 09–17 | possible: 07–09, 17–20 | stretch: 06–07, 20–22 | off: rest
function hourType(h){
  if(h>=9&&h<17)  return 'ideal';
  if(h>=7&&h<9)   return 'possible';
  if(h>=17&&h<20) return 'possible';
  if(h>=6&&h<7)   return 'stretch';
  if(h>=20&&h<22) return 'stretch';
  return 'off';
}
// blue opacities per type
const TYPE_OPACITY={ideal:'1',possible:'0.30',stretch:'0.11',off:'0'};

// ─── STATE ────────────────────────────────────────────────────────────────────
let participants=[];
let selectedCity=null;
let pinnedIdx=-1;       // which participant's local hours show in header
const MAX=6;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function pad2(n){return String(Math.floor(((n%24)+24)%24)).padStart(2,'0')}
function fmtH(h){
  h=((h%24)+24)%24;
  const hh=Math.floor(h),mm=Math.round((h-hh)*60);
  return pad2(hh)+':'+String(mm).padStart(2,'0');
}
function localH(utcH,off){return ((utcH+off)%24+24)%24}

// Pre-compute all offsets once at startup — instant lookup at add-time
const OFFSET_CACHE=Object.create(null);
(function buildCache(){
  const now=new Date();
  const utcDate=new Date(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),now.getUTCHours(),now.getUTCMinutes());
  const tzSet=[...new Set(CITIES.map(c=>c.tz))];
  tzSet.forEach(tz=>{
    try{
      const f=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false,year:'numeric',month:'2-digit',day:'2-digit'});
      const parts=f.formatToParts(now);
      const get=type=>parseInt(parts.find(p=>p.type===type).value);
      const localDate=new Date(get('year'),get('month')-1,get('day'),get('hour'),get('minute'));
      let diff=(localDate-utcDate)/3600000;
      if(diff>14)diff-=24;if(diff<-12)diff+=24;
      OFFSET_CACHE[tz]=Math.round(diff*4)/4;
    }catch(e){OFFSET_CACHE[tz]=0;}
  });
})();
function getLiveOffset(city){return OFFSET_CACHE[city.tz]??0;}
function visitorOffset(){return -new Date().getTimezoneOffset()/60}
function visitorLabel(){
  try{return Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace(/_/g,' ')}
  catch(e){return 'Local'}
}
function offStr(off){
  const s=off>=0?'+':'-',a=Math.abs(off),h=Math.floor(a),m=Math.round((a-h)*60);
  return 'GMT'+s+h+(m?':'+String(m).padStart(2,'0'):'');
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────────────────────
const inpCity=document.getElementById('inp-city');
const acEl=document.getElementById('ac-list');
let acIdx=-1;

inpCity.addEventListener('input',()=>{
  selectedCity=null;
  const q=inpCity.value.trim().toLowerCase();
  if(q.length<1){acEl.style.display='none';return}
  const hits=CITIES.filter(c=>c.name.toLowerCase().includes(q)||c.country.toLowerCase().includes(q)).slice(0,8);
  if(!hits.length){acEl.style.display='none';return}
  acEl.innerHTML='';acIdx=-1;
  hits.forEach(c=>{
    const d=document.createElement('div');
    d.innerHTML=`<span class="ac-flag">${c.flag}</span><span>${c.name}</span><span class="ac-ctry">${c.country}</span>`;
    d.addEventListener('mousedown',e=>{e.preventDefault();pickCity(c)});
    acEl.appendChild(d);
  });
  acEl.style.display='block';
});
inpCity.addEventListener('keydown',e=>{
  const items=acEl.querySelectorAll('div');
  if(e.key==='ArrowDown'){acIdx=Math.min(acIdx+1,items.length-1);hlAc(items);e.preventDefault()}
  else if(e.key==='ArrowUp'){acIdx=Math.max(acIdx-1,0);hlAc(items);e.preventDefault()}
  else if(e.key==='Enter'){acIdx>=0&&items[acIdx]?items[acIdx].dispatchEvent(new Event('mousedown')):tryAdd();e.preventDefault()}
  else if(e.key==='Escape')acEl.style.display='none';
});
function hlAc(items){items.forEach((it,i)=>it.classList.toggle('hi',i===acIdx));if(acIdx>=0)items[acIdx].scrollIntoView({block:'nearest'})}
function pickCity(c){selectedCity=c;inpCity.value=c.name+', '+c.country;acEl.style.display='none';document.getElementById('inp-name').focus()}
document.addEventListener('click',e=>{if(!e.target.closest('.city-wrap'))acEl.style.display='none'});

// ─── ADD / REMOVE ─────────────────────────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click',tryAdd);
document.getElementById('inp-name').addEventListener('keydown',e=>{if(e.key==='Enter')tryAdd()});
function tryAdd(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name){toast('Please enter a name');return}
  if(!selectedCity){toast('Please select a city from the list');return}
  if(participants.length>=MAX){toast('Maximum 6 participants');return}
  if(participants.find(p=>p.name.toLowerCase()===name.toLowerCase())){toast('That name is already added');return}
  participants.push({name,city:selectedCity,offset:getLiveOffset(selectedCity)});
  document.getElementById('inp-name').value='';
  inpCity.value='';selectedCity=null;
  render();
  document.getElementById('inp-name').focus();
}
function removePerson(i){
  participants.splice(i,1);
  if(pinnedIdx>=participants.length)pinnedIdx=-1;
  render();
}
document.getElementById('btn-clear').addEventListener('click',()=>{participants=[];pinnedIdx=-1;render()});

}

// ─── TIMELINE ─────────────────────────────────────────────────────────────────
// scrubber state — persists across re-renders
let scrubPct=null; // null = "now"

function getNowPct(){
  const now=new Date();
  return (now.getUTCHours()+now.getUTCMinutes()/60)/24;
}

function renderTimeline(){
  const card=document.getElementById('card-tl');
  if(!participants.length){card.style.display='none';return}
  card.style.display='block';

  const grid=document.getElementById('tl-grid');
  grid.innerHTML='';
  const n=participants.length;

  // pre-compute hour types per person
  const personTypes=participants.map(p=>
    Array.from({length:24},(_,h)=>hourType(localH(h,p.offset)))
  );

  // overlap scores per UTC hour
  const scores=Array.from({length:24},(_,h)=>{
    let ideal=0,possible=0,stretch=0;
    personTypes.forEach(pt=>{
      if(pt[h]==='ideal')    ideal++;
      else if(pt[h]==='possible') possible++;
      else if(pt[h]==='stretch')  stretch++;
    });
    return{ideal,possible,stretch,total:ideal+possible+stretch};
  });

  // ── UTC header row ────────────────────────────────────────────────────────
  const hdrArea=document.createElement('div');
  hdrArea.className='tl-hdr-area';

  const utcRow=document.createElement('div');
  utcRow.className='tl-hdr-row';
  const utcLbl=document.createElement('div');
  utcLbl.className='tl-rlabel';utcLbl.textContent='UTC';
  const utcHrs=document.createElement('div');
  utcHrs.className='tl-hlabels';
  for(let h=0;h<24;h+=2){
    const l=document.createElement('div');
    l.className='tl-hl';l.textContent=pad2(h);
    utcHrs.appendChild(l);
  }
  utcRow.appendChild(utcLbl);utcRow.appendChild(utcHrs);
  hdrArea.appendChild(utcRow);

  // ── Local time row ────────────────────────────────────────────────────────
  const localRow=document.createElement('div');
  localRow.className='tl-local-row';
  const localTag=document.createElement('div');
  localTag.className='tl-ltag';
  const localHrsEl=document.createElement('div');
  localHrsEl.className='tl-lhours';
  localRow.appendChild(localTag);localRow.appendChild(localHrsEl);
  hdrArea.appendChild(localRow);
  grid.appendChild(hdrArea);

  // Function to refresh local row — closes over localTag & localHrsEl (stable refs)
  function refreshLocalRow(utcFrac){
    localHrsEl.innerHTML='';
    let off,label;
    if(pinnedIdx>=0&&pinnedIdx<participants.length){
      const p=participants[pinnedIdx];
      off=p.offset;label=p.name;
      localTag.innerHTML=`<span class="ldot"></span><span class="lname">${label}</span>`;
      localTag.style.color='var(--blue)';
    }else{
      off=visitorOffset();label=visitorLabel();
      localTag.innerHTML=`<span class="ldot" style="background:var(--text3)"></span><span class="lname" style="color:var(--text3)">${label}</span>`;
    }
    // Show local time at the scrubber position if dragging, else every 2h
    if(utcFrac!==undefined){
      // Show single time at scrub position — handled by per-row tips
      // Just show even hours translated
    }
    for(let h=0;h<24;h+=2){
      const lh=localH(h,off);
      const l=document.createElement('div');
      l.className='tl-ll';l.textContent=pad2(lh);
      localHrsEl.appendChild(l);
    }
  }

  // ── Hint ─────────────────────────────────────────────────────────────────
  const hint=document.createElement('div');
  hint.className='tl-hint';
  hint.textContent='👆 Click a name to pin their local hours  ·  drag the time cursor to explore';
  grid.appendChild(hint);

  // ── Person rows ───────────────────────────────────────────────────────────
  const nameEls=[];
  const rowEls=[];
  const rowTips=[];

  participants.forEach((p,pi)=>{
    const row=document.createElement('div');
    row.className='tl-row';

    const nameEl=document.createElement('div');
    nameEl.className='tl-name';
    nameEl.title=`Pin ${p.name}'s local hours`;
    nameEl.innerHTML=`<span>${p.city.flag}</span><span>${p.name}</span>`;
    nameEl.addEventListener('click',()=>{
      pinnedIdx=(pinnedIdx===pi)?-1:pi;
      refreshLocalRow();refreshNameHL();
    });
    nameEls.push(nameEl);

    const blocksEl=document.createElement('div');
    blocksEl.className='tl-blocks';
    personTypes[pi].forEach(type=>{
      const b=document.createElement('div');
      b.className='tl-b';
      if(type==='off'){
        b.style.background='var(--border)';
      }else{
        b.style.background='var(--blue)';
        b.style.opacity=TYPE_OPACITY[type];
      }
      blocksEl.appendChild(b);
    });

    // per-row scrubber tip
    const rowTip=document.createElement('div');
    rowTip.className='row-tip';
    rowTip.style.right='auto'; // we'll position left dynamically

    row.appendChild(nameEl);row.appendChild(blocksEl);row.appendChild(rowTip);
    grid.appendChild(row);
    rowEls.push({row,blocksEl});
    rowTips.push(rowTip);
  });

  function refreshNameHL(){
    nameEls.forEach((el,pi)=>{
      el.classList.toggle('pinned',pinnedIdx===pi);
    });
  }

  // ── Separator ─────────────────────────────────────────────────────────────
  const sep=document.createElement('div');
  sep.className='tl-sep';
  grid.appendChild(sep);

  // ── Overlap row ───────────────────────────────────────────────────────────
  const ovRow=document.createElement('div');
  ovRow.className='tl-ov-row';
  const ovLabel=document.createElement('div');
  ovLabel.className='tl-ov-label';ovLabel.textContent='Overlap';

  const ovWrap=document.createElement('div');
  ovWrap.className='tl-ov-wrap';

  const ovBlocks=document.createElement('div');
  ovBlocks.className='tl-ov-blocks';
  scores.forEach(({ideal,possible,stretch,total})=>{
    const b=document.createElement('div');
    b.className='tl-ovb';
    if(ideal===n)              b.style.background='#15803d';
    else if(total===n&&ideal>0)    b.style.background='#4ade80';
    else if(total===n&&possible>0) b.style.background='#fcd34d';
    else if(total===n&&stretch===n)b.style.background='#fb923c';
    else                       b.style.background='var(--border)';
    ovBlocks.appendChild(b);
  });

  // Scrubber lives inside ovWrap — same coordinate space as ovBlocks
  const scrubber=document.createElement('div');
  scrubber.className='scrubber';

  const scrubTip=document.createElement('div');
  scrubTip.className='scrub-tip';

  // fullLine also lives inside ovWrap — extends UPWARD through person rows
  // ovWrap is position:relative and height:28px
  // We extend the line upward by making top negative
  const fullLine=document.createElement('div');
  fullLine.className='now-full-line';
  fullLine.style.bottom='0';
  fullLine.style.top='auto'; // will set dynamically

  ovWrap.appendChild(ovBlocks);
  ovWrap.appendChild(fullLine);
  ovWrap.appendChild(scrubber);
  ovWrap.appendChild(scrubTip);
  ovRow.appendChild(ovLabel);
  ovRow.appendChild(ovWrap);
  grid.appendChild(ovRow);

  // ── Scrubber positioning ──────────────────────────────────────────────────
  // Everything is relative to ovWrap/ovBlocks — single coordinate space, no offset confusion
  function positionScrubber(pct, showTips){
    pct=Math.max(0,Math.min(1,pct));
    const w=ovBlocks.offsetWidth||440;
    const left=pct*w;
    const utcFrac=pct*24;

    // Scrubber line + handle (inside ovWrap)
    scrubber.style.left=left+'px';

    // UTC tooltip above scrubber
    scrubTip.style.left=left+'px';
    scrubTip.textContent=fmtH(utcFrac)+' UTC';
    scrubTip.classList.toggle('show',showTips);

    // fullLine: same left as scrubber, extends from top of person rows down to bottom of ovWrap
    // Measure how far up we need to go from ovWrap top to the top of the first person row
    const ovWrapTop=ovWrap.getBoundingClientRect().top;
    const firstRowTop=rowEls.length>0?rowEls[0].row.getBoundingClientRect().top:ovWrapTop;
    const upDist=Math.max(ovWrapTop-firstRowTop,0);
    fullLine.style.left=left+'px';
    fullLine.style.height=(upDist+28)+'px'; // 28 = overlap row height
    fullLine.style.bottom='0';
    fullLine.style.top='auto';
    // Extend up by moving top to negative
    const totalH=upDist+28;
    fullLine.style.top=(-upDist)+'px';
    fullLine.style.height=totalH+'px';
    fullLine.style.bottom='auto';

    // Per-row tips: each positioned inside its own .tl-row at the right x
    rowEls.forEach(({row,blocksEl},pi)=>{
      const p=participants[pi];
      const lh=localH(utcFrac,p.offset);
      const type=hourType(lh);
      const tip=rowTips[pi];

      // x position: offset of blocksEl left within its row + left within blocks
      // blocksEl starts after the 100px name column; tip floats just right of the line
      const blockLeft=blocksEl.offsetLeft; // should be ~100px
      tip.style.left=(blockLeft+left+5)+'px';
      tip.style.top='50%';
      tip.style.transform='translateY(-50%)';

      let label=fmtH(lh);
      if((utcFrac+p.offset)>=24) label+=' +1';
      else if((utcFrac+p.offset)<0) label+=' −1';
      tip.textContent=label;

      const bgColor=type==='ideal'?'#15803d'
        :type==='possible'?'#d97706'
        :type==='stretch'?'#ea580c'
        :'#6b7280';
      tip.style.background=bgColor;
      tip.classList.toggle('show',showTips);
    });
  }

  function getBlocksWidth(){return ovBlocks.offsetWidth||440} // kept for safety

  function pctFromEvent(e){
    const rect=ovBlocks.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    return Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
  }

  let dragging=false;
  function onDragStart(e){
    e.preventDefault();dragging=true;
    const pct=pctFromEvent(e);
    scrubPct=pct;positionScrubber(pct,true);
  }
  function onDragMove(e){
    if(!dragging)return;e.preventDefault();
    const pct=pctFromEvent(e);
    scrubPct=pct;positionScrubber(pct,true);
  }
  function onDragEnd(){
    if(!dragging)return;dragging=false;
    positionScrubber(scrubPct,false);
  }

  [scrubber,ovBlocks].forEach(el=>{
    el.addEventListener('mousedown',onDragStart);
    el.addEventListener('touchstart',onDragStart,{passive:false});
  });
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('mouseup',onDragEnd);
  document.addEventListener('touchend',onDragEnd);

  ovBlocks.addEventListener('dblclick',()=>{
    scrubPct=getNowPct();positionScrubber(scrubPct,false);
  });

  // Single rAF after all DOM is appended — layout is stable by then
  requestAnimationFrame(()=>{
    if(scrubPct===null) scrubPct=getNowPct();
    positionScrubber(scrubPct,false);
    refreshLocalRow();
    refreshNameHL();
  });

  // ── Legend ────────────────────────────────────────────────────────────────
  document.getElementById('tl-legend').innerHTML=`
    <div class="leg-item"><div class="leg-block" style="background:var(--blue)"></div>Ideal (09–17)</div>
    <div class="leg-item"><div class="leg-block" style="background:var(--blue);opacity:.30"></div>Possible (07–09 · 17–20)</div>
    <div class="leg-item"><div class="leg-block" style="background:var(--blue);opacity:.11"></div>Stretch (06–07 · 20–22)</div>
    <div class="leg-item"><div class="leg-block" style="background:#15803d"></div>All ideal</div>
    <div class="leg-item"><div class="leg-block" style="background:#4ade80"></div>All covered</div>
    <div class="leg-item"><div class="leg-block" style="background:#fcd34d"></div>Workable</div>
    <div class="leg-item"><span style="display:inline-block;width:10px;height:10px;background:var(--now);border-radius:50%"></span>Time cursor</div>`;

  // ── Summary badge ─────────────────────────────────────────────────────────
  const fullIdeal   =scores.filter(s=>s.ideal===n).length;
  const fullCovered =scores.filter(s=>s.total===n&&s.ideal>0).length;
  const fullFeasible=scores.filter(s=>s.total===n&&s.ideal===0).length;
  const sumEl=document.getElementById('ov-summary');
  sumEl.innerHTML='';
  const b=document.createElement('div');
  if(fullIdeal>0){b.className='badge badge-green';b.innerHTML=`<span class="bdot bdot-g"></span>${fullIdeal}h everyone in core hours`}
  else if(fullCovered>0){b.className='badge badge-green';b.innerHTML=`<span class="bdot bdot-g"></span>${fullCovered}h all covered (mixed)`}
  else if(fullFeasible>0){b.className='badge badge-yellow';b.innerHTML=`<span class="bdot bdot-y"></span>${fullFeasible}h workable — early/late`}
  else{b.className='badge badge-gray';b.textContent='No full overlap — best compromise below'}
  sumEl.appendChild(b);
}

// ─── SUGGESTIONS ──────────────────────────────────────────────────────────────
function renderSugs(){
  const card=document.getElementById('card-sugs');
  if(participants.length<2){card.style.display='none';return}
  card.style.display='block';
  const el=document.getElementById('sugs');
  el.innerHTML='';
  const n=participants.length;

  const scored=Array.from({length:24},(_,utcH)=>{
    let ideal=0,possible=0,stretch=0;
    participants.forEach(p=>{
      const t=hourType(localH(utcH,p.offset));
      if(t==='ideal')    ideal++;
      else if(t==='possible') possible++;
      else if(t==='stretch')  stretch++;
    });
    return{utcH,ideal,possible,stretch,score:ideal*3+possible*2+stretch};
  }).sort((a,b)=>b.score-a.score||a.utcH-b.utcH);

  const picks=[];
  for(const s of scored){
    if(picks.length>=3)break;
    if(picks.some(p=>Math.abs(p.utcH-s.utcH)<2))continue;
    picks.push(s);
  }

  if(!picks.length){el.innerHTML='<p style="color:var(--text3);font-size:.85rem">No windows found.</p>';return}

  picks.forEach((pick,idx)=>{
    const{utcH,ideal,possible,stretch}=pick;
    const total=ideal+possible+stretch;
    const cls=idx===0?'sug best':total===n?'sug ok':'sug';
    const dotCls=ideal===n?'bdot-g':total===n?'bdot-y':'bdot-r';
    const qualLbl=ideal===n?'Everyone in core hours':
      ideal>0?`${ideal} ideal · ${possible+stretch} early/late`:
      possible===n?'Possible for everyone':
      `${total} of ${n} available`;

    const timesHtml=participants.map(p=>{
      const lh=localH(utcH,p.offset);
      const type=hourType(lh);
      const nd=(utcH+p.offset)>=24,pd=(utcH+p.offset)<0;
      const dayTag=nd?'<span class="snd">+1 day</span>':pd?'<span class="snd">−1 day</span>':'';
      const col=type==='ideal'?'var(--text)':type==='possible'?'#d97706':'#ea580c';
      return `<div class="sug-t"><span class="sc">${p.city.flag} ${p.city.name}</span><span class="st" style="color:${col}">${fmtH(lh)}</span>${dayTag}</div>`;
    }).join('');

    const note=ideal===n?'✓ Best option':total===n?'⚠ Early/late for some':'⚠ Off-hours for some';
    const div=document.createElement('div');
    div.className=cls;
    div.innerHTML=`
      <div class="sug-head"><span class="bdot ${dotCls}"></span><span class="sug-title">Option ${'ABC'[idx]} — ${qualLbl}</span><span class="sug-utc">UTC ${fmtH(utcH)}</span></div>
      <div class="sug-times">${timesHtml}</div>
      <div class="sug-foot"><span class="foot-note">${note}</span>
        <button class="wa-btn">
          <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.5 2C6.253 2 2 6.253 2 11.5c0 1.916.564 3.703 1.54 5.201L2 22l5.456-1.507A9.454 9.454 0 0011.5 21C16.747 21 21 16.747 21 11.5S16.747 2 11.5 2zm0 17.325a7.807 7.807 0 01-3.991-1.094l-.286-.17-2.963.818.849-2.883-.187-.297A7.81 7.81 0 013.676 11.5c0-4.316 3.509-7.825 7.825-7.825 4.315 0 7.824 3.509 7.824 7.825 0 4.316-3.509 7.825-7.824 7.825z"/></svg>
          Copy for WhatsApp
        </button>
      </div>`;
    div.querySelector('.wa-btn').addEventListener('click',()=>copyWA(pick));
    el.appendChild(div);
  });
}

// ─── WHATSAPP ─────────────────────────────────────────────────────────────────
function copyWA(pick){
  const{utcH,ideal,possible,stretch}=pick;
  const n=participants.length;
  const names=participants.map(p=>p.name).join(', ');
  const qual=ideal===n?'✅ Everyone in core hours':
    ideal>0?`🟡 ${ideal} ideal · ${possible+stretch} early/late`:
    `🟠 Workable — early/late for all`;
  const lines=participants.map(p=>{
    const lh=localH(utcH,p.offset);
    const type=hourType(lh);
    const nd=(utcH+p.offset)>=24,pd=(utcH+p.offset)<0;
    const tag=nd?' (+1 day)':pd?' (−1 day)':'';
    const note=type==='possible'?' ⚡':type==='stretch'?' 🌙':type==='off'?' ❌':'';
    return`  • ${p.name} (${p.city.name}): ${fmtH(lh)}${tag}${note}`;
  }).join('\n');
  const msg=`📅 *Meeting time for ${names}*\n${qual}\n\n${lines}\n\n🌐 UTC ${fmtH(utcH)}\n\nView timeline → ${buildShareUrl()}`;
  navigator.clipboard.writeText(msg).then(()=>toast('✓ Copied — paste into WhatsApp')).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=msg;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('✓ Copied — paste into WhatsApp');
  });
}

// ─── SHARE ────────────────────────────────────────────────────────────────────
function buildShareUrl(){
  const hash='#'+participants.map(p=>encodeURIComponent(p.name)+':'+encodeURIComponent(p.city.name)).join('|');
  return window.location.href.split('#')[0]+hash;
}
function renderShare(){
  const card=document.getElementById('card-share');
  if(!participants.length){card.style.display='none';return}
  card.style.display='block';
  document.getElementById('share-url').textContent=buildShareUrl();
  history.replaceState(null,'',buildShareUrl());
}
document.getElementById('btn-copy-link').addEventListener('click',()=>{
  navigator.clipboard.writeText(buildShareUrl()).catch(()=>{});
  toast('✓ Link copied');
});

// ─── LOAD FROM HASH ───────────────────────────────────────────────────────────
function loadFromHash(){
  const hash=window.location.hash.slice(1);
  if(!hash)return;
  hash.split('|').forEach(part=>{
    const[rn,rc]=part.split(':');
    if(!rn||!rc)return;
    const name=decodeURIComponent(rn);
    const city=CITIES.find(c=>c.name.toLowerCase()===decodeURIComponent(rc).toLowerCase());
    if(!city||participants.length>=MAX)return;
    if(participants.find(p=>p.name.toLowerCase()===name.toLowerCase()))return;
    participants.push({name,city,offset:getLiveOffset(city)});
  });
  if(participants.length)render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadFromHash();
// Nudge scrubber to "now" every minute
setInterval(()=>{
  if(participants.length&&scrubPct===null)renderTimeline();
},60000);
</script>
